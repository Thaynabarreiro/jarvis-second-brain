<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --ink: #070412;
      --paper: #F5F2FC;
      --ash: #8F86A5;
      --signal: #7C6BFF;
      --signal-glow: rgba(124, 107, 255, 0.25);
      --signal-border: rgba(124, 107, 255, 0.4);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
    }
    
    html, body {
      margin: 0;
      height: 100%;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-sans);
      overflow: hidden;
      -webkit-user-select: none;
    }
    
    .panel {
      position: relative;
      padding: 20px 24px;
      border-radius: 8px;
      background: rgba(244, 241, 234, .02);
      border: 1px solid rgba(244, 241, 234, .08);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }
    
    .panel .glow {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      border: 1.5px solid var(--signal);
      box-shadow: 0 0 28px var(--signal-glow);
      opacity: 0;
      transition: opacity .3s ease;
      pointer-events: none;
    }
    
    .mono {
      font-family: var(--font-mono);
    }
    
    .label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ash);
    }
    
    @keyframes jspin { to { transform: rotate(360deg); } }
    @keyframes jspinrev { to { transform: rotate(-360deg); } }
    @keyframes jwave { 0%, 100% { transform: scaleY(.16); } 50% { transform: scaleY(1); } }
    @keyframes jcore { 0%, 100% { transform: scale(1); opacity: .9; } 50% { transform: scale(1.06); opacity: 1; } }
    
    .close-btn {
      position: absolute;
      top: 32px;
      right: 32px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(244, 241, 234, 0.04);
      border: 1px solid rgba(244, 241, 234, 0.1);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      color: var(--paper);
      font-weight: 300;
      font-size: 20px;
      transition: all 0.2s ease;
    }
    
    .close-btn:hover {
      background: rgba(124, 107, 255, 0.2);
      border-color: var(--signal);
      box-shadow: 0 0 10px rgba(124, 107, 255, 0.4);
    }
  </style>
</head>
<body>
<div style="position:relative; width:100vw; height:100vh; overflow:hidden; background: radial-gradient(circle at center, #1b0e3b 0%, #070412 75%);">

  <!-- HUD corner brackets -->
  <div style="position:absolute; top:18px; left:18px; width:22px; height:22px; border-top:1px solid rgba(244,241,234,.15); border-left:1px solid rgba(244,241,234,.15)"></div>
  <div style="position:absolute; top:18px; right:18px; width:22px; height:22px; border-top:1px solid rgba(244,241,234,.15); border-right:1px solid rgba(244,241,234,.15)"></div>
  <div style="position:absolute; bottom:18px; left:18px; width:22px; height:22px; border-bottom:1px solid rgba(244,241,234,.15); border-left:1px solid rgba(244,241,234,.15)"></div>
  <div style="position:absolute; bottom:18px; right:18px; width:22px; height:22px; border-bottom:1px solid rgba(244,241,234,.15); border-right:1px solid rgba(244,241,234,.15)"></div>

  <!-- Close / Minimize Button -->
  <div class="close-btn" onclick="closeHome()">&times;</div>

  <!-- TOP-MIDDLE: Birthday banner -->
  <div id="birthday-panel" style="position:absolute; top:32px; left:50%; transform:translateX(-50%); z-index:3;">
    <!-- Rendered dynamically -->
  </div>

  <!-- ORB -->
  <div id="orbwrap" style="position:absolute; top:calc(50% - 20px); left:50%;
    transform:translate(-50%,-50%) scale(1); transition:transform .5s cubic-bezier(.2,.7,.2,1);
    pointer-events:none; z-index:2">
    <div style="position:relative; width:260px; height:260px; display:flex; align-items:center; justify-content:center">
      <div style="position:absolute; inset:0; border-radius:50%; border:1px solid rgba(124,107,255,.16); animation:jspin 44s linear infinite"></div>
      <div style="position:absolute; inset:20px; border-radius:50%; border:1px dashed rgba(244,241,234,.06); animation:jspinrev 34s linear infinite"></div>
      <div style="position:absolute; inset:38px; border-radius:50%; border:2px solid transparent; border-top-color:var(--signal); border-right-color:rgba(124,107,255,.35); animation:jspin 9s linear infinite"></div>
      <div style="position:absolute; inset:60px; border-radius:50%; border:2px dotted rgba(124,107,255,.28); animation:jspinrev 26s linear infinite"></div>
      <div id="core" style="position:relative; width:108px; height:108px; border-radius:50%;
        background:rgba(124,107,255,.07); border:1px solid rgba(124,107,255,.42);
        box-shadow:0 0 60px rgba(124,107,255,.28),inset 0 0 40px rgba(124,107,255,.14);
        display:flex; align-items:center; justify-content:center; transition:transform .3s ease;
        animation:jcore 3.4s ease-in-out infinite">
        <div id="eq" style="display:flex; align-items:center; justify-content:center; gap:2px; height:12px; width:88px"></div>
      </div>
    </div>
  </div>

  <!-- LEFT: clock + greeting -->
  <div style="position:absolute; top:32px; left:32px; width:270px; z-index:3">
    <div class="panel" id="panel-greeting">
      <div class="glow"></div>
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px">
        <span style="font-size:16px; font-weight:500; letter-spacing:-.04em">move ai</span>
        <span class="mono" style="font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:var(--signal); border:1px solid var(--signal-border); border-radius:2px; padding:2px 5px">Jarvis</span>
      </div>
      <div id="clock" class="mono" style="font-size:42px; font-weight:500; letter-spacing:-.02em; line-height:1">--:--</div>
      <div id="dateStr" class="mono label" style="margin-top:10px">-</div>
      <div id="greeting" style="font-size:15px; font-weight:500; margin-top:12px">-</div>
    </div>
  </div>

  <!-- LEFT: agenda -->
  <div style="position:absolute; top:230px; left:32px; width:270px; z-index:3">
    <div class="panel" id="panel-agenda">
      <div class="glow"></div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
        <span class="label">Hoje &middot; agenda</span>
      </div>
      <div id="agenda" style="display:flex; flex-direction:column"></div>
    </div>
  </div>

  <!-- RIGHT: weather -->
  <div id="weatherWrap" style="position:absolute; top:80px; right:32px; width:270px; z-index:3; display:none">
    <div class="panel" id="panel-weather">
      <div class="glow"></div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
        <span class="label">Clima</span>
        <span id="weatherCity" class="mono" style="font-size:11px; color:var(--paper)"></span>
      </div>
      <div style="display:flex; align-items:baseline; gap:10px">
        <span id="weatherTemp" style="font-size:42px; font-weight:500; letter-spacing:-.04em; line-height:1">--&deg;</span>
        <span id="weatherDesc" style="font-size:13px; font-weight:500; color:var(--ash)"></span>
      </div>
    </div>
  </div>

  <!-- RIGHT: Outreach stats (directly below weather) -->
  <div id="outreachWrap" style="position:absolute; top:230px; right:32px; width:270px; z-index:3;">
    <div class="panel" id="panel-outreach">
      <div class="glow"></div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span class="label">Outreach &middot; Métricas</span>
        <span class="mono" style="font-size:8px; color:var(--signal); letter-spacing:0.05em;">ONTEM</span>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div style="padding:10px 8px; border-radius:6px; background:rgba(244,241,234,0.02); border:1px solid rgba(244,241,234,0.06); text-align:center;">
          <div id="outreach-felipe" style="font-size:20px; font-weight:500; line-height:1; color:var(--paper)">0</div>
          <div style="font-family:var(--font-mono); font-size:8px; letter-spacing:0.02em; text-transform:uppercase; color:var(--ash); margin-top:5px;">Felipe</div>
        </div>
        <div style="padding:10px 8px; border-radius:6px; background:rgba(244,241,234,0.02); border:1px solid rgba(244,241,234,0.06); text-align:center;">
          <div id="outreach-thayna" style="font-size:20px; font-weight:500; line-height:1; color:var(--paper)">0</div>
          <div style="font-family:var(--font-mono); font-size:8px; letter-spacing:0.02em; text-transform:uppercase; color:var(--ash); margin-top:5px;">Thayná</div>
        </div>
        <div style="padding:10px 8px; border-radius:6px; background:rgba(124,107,255,0.08); border:1px solid rgba(124,107,255,0.2); text-align:center; grid-column: span 2;">
          <div style="display:flex; align-items:baseline; justify-content:center; gap:5px;">
            <span id="outreach-positives" style="font-size:22px; font-weight:500; line-height:1; color:var(--signal)">0</span>
            <span style="font-size:12px; color:var(--ash);">/</span>
            <span id="outreach-negatives" style="font-size:16px; color:#E8A05C;">0</span>
          </div>
          <div style="font-family:var(--font-mono); font-size:8px; letter-spacing:0.04em; text-transform:uppercase; color:var(--signal); margin-top:5px;">Respostas Pos / Neg</div>
        </div>
        <div style="padding:10px 8px; border-radius:6px; background:rgba(244,241,234,0.02); border:1px solid rgba(244,241,234,0.06); text-align:center; grid-column: span 2;">
          <div id="outreach-followups" style="font-size:20px; font-weight:500; line-height:1; color:var(--paper)">0</div>
          <div style="font-family:var(--font-mono); font-size:8px; letter-spacing:0.04em; text-transform:uppercase; color:var(--ash); margin-top:5px;">Follow-ups Enviados</div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM: caption + status -->
  <div style="position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
    width:min(560px,50vw); display:flex; flex-direction:column; align-items:center; gap:12px; z-index:4">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px; min-height:50px">
      <span id="topicLabel" class="mono" style="font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--signal)"></span>
      <p id="caption" style="font-size:16px; font-weight:400; line-height:1.5; letter-spacing:-.01em; text-align:center; margin:0"></p>
    </div>
    <span class="mono label" style="display:flex; align-items:center; gap:7px">
      <span id="statusDot" style="width:6px;height:6px;border-radius:50%;background:var(--ash)"></span>
      <span id="statusLabel">Standby</span>
    </span>
  </div>

</div>
<script>
const $=id=>document.getElementById(id);

function buildEqualizer(mode){
  const eq=$('eq');
  if(eq.childElementCount!==28){
    eq.innerHTML='';
    for(let i=0;i<28;i++){const s=document.createElement('span');
      s.style.cssText='width:2px;border-radius:2px;background:var(--signal);flex-shrink:0;height:100%;transform-origin:center';
      eq.appendChild(s);}
  }
  const on=mode==='speaking'||mode==='listening';
  const h=mode==='speaking'?54:mode==='listening'?30:8;
  const dur=mode==='speaking'?.55:.9;
  eq.style.height=h+'px';eq.style.transition='height .35s ease';
  [...eq.children].forEach((s,i)=>{
    const off=Math.abs(i-13.5)/13.5;
    s.style.animation=on?`jwave ${dur}s ${(i*0.035).toFixed(3)}s ease-in-out infinite`:'none';
    s.style.transform=on?'':'scaleY(0.14)';
    s.style.opacity=on?(0.5+0.5*(1-off)):0.3;
    s.style.boxShadow=mode==='speaking'?'0 0 6px rgba(124,107,255,.55)':'none';
  });
}

let lastMode='idle';
function applyMode(mode, text){
  if(mode!==lastMode){
    lastMode=mode;
    $('orbwrap').style.transform='translate(-50%,-50%) scale('+(mode==='speaking'?1.14:mode==='listening'?1.06:1)+')';
    $('statusDot').style.background=mode==='idle'?'var(--ash)':'var(--signal)';
    $('statusDot').style.boxShadow=mode==='idle'?'none':'0 0 8px var(--signal)';
    $('statusLabel').textContent=mode==='speaking'?'Falando':mode==='listening'?'Escutando':mode==='thinking'?'Pensando':'Standby';
    $('topicLabel').textContent=mode==='idle'?'':( mode==='listening'?'Ouvindo':mode==='thinking'?'Processando':'Resposta');
  }
  buildEqualizer(mode);
  $('caption').textContent=mode==='idle'?'':(text||'');
}

const PANEL_IDS={greeting:'panel-greeting',weather:'panel-weather',agenda:'panel-agenda',outreach:'panel-outreach'};
function setActiveTopic(topic){
  Object.entries(PANEL_IDS).forEach(([key,id])=>{
    const el=$(id);if(!el)return;
    const active=topic===key;
    el.querySelector('.glow').style.opacity=active?1:0;
    el.style.opacity=topic?(active?1:.32):1;
    el.style.transform=active?'scale(1.03)':'scale(1)';
    el.style.transition='opacity .35s ease, transform .35s ease';
  });
}

function renderWeather(w){
  if(!w){$('weatherWrap').style.display='none';return;}
  $('weatherWrap').style.display='block';
  $('weatherCity').textContent=w.city||'';
  $('weatherTemp').innerHTML=Math.round(w.temp)+'&deg;';
  $('weatherDesc').textContent=w.desc||'';
}

function renderAgenda(items){
  const el=$('agenda');
  if(!items||!items.length){el.innerHTML='<div class="mono" style="font-size:11px;color:var(--ash);padding:8px 0">Nada agendado.</div>';return;}
  el.innerHTML=items.map(ev=>`
    <div style="display:flex;gap:10px;padding:8px 0;border-top:1px solid rgba(244,241,234,.07)">
      <span class="mono" style="font-size:12px;color:var(--paper);width:40px;flex-shrink:0">${ev.time||''}</span>
      <div style="width:2px;border-radius:2px;flex-shrink:0;background:var(--signal)"></div>
      <span style="font-size:13px;font-weight:500;color:var(--paper);line-height:1.25">${ev.title}</span>
    </div>`).join('');
}

function renderBirthdays(birthdays) {
  const el = $('birthday-panel');
  if (!birthdays || birthdays.length === 0) {
    el.innerHTML = `
      <div style="display:flex; align-items:center; gap:10px; padding:6px 16px; border-radius:9999px; background:rgba(244,241,234,0.02); border:1px solid rgba(244,241,234,0.05);">
        <span style="font-family:var(--font-mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ash);">Nenhum aniversário esta semana</span>
      </div>
    `;
    return;
  }
  const b = birthdays[0];
  const initials = b.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
  el.innerHTML = `
    <div style="position:relative; display:flex; align-items:center; gap:12px; padding:8px 16px 8px 10px; border-radius:9999px; background:rgba(244,241,234,0.05); border:1px solid rgba(244,241,234,0.12); backdrop-filter:blur(8px);">
      <div style="width:34px; height:34px; border-radius:50%; background:var(--signal); color:var(--ink); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:12px; font-weight:600; box-shadow:0 0 12px var(--signal)">${initials}</div>
      <div style="display:flex; flex-direction:column; gap:1px;">
        <span style="font-family:var(--font-mono); font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--signal);">Aniversário na semana</span>
        <span style="font-size:13px; font-weight:500; color:var(--paper);">${b.name} &middot; <span style="color:var(--ash);">${b.date}</span></span>
      </div>
    </div>
  `;
}

function renderOutreach(outreach) {
  if (!outreach) return;
  $('outreach-felipe').textContent = outreach.felipe_sent || 0;
  $('outreach-thayna').textContent = outreach.thayna_sent || 0;
  $('outreach-positives').textContent = outreach.positives || 0;
  $('outreach-negatives').textContent = outreach.negatives || 0;
  $('outreach-followups').textContent = outreach.followups || 0;
}

function closeHome() {
  try {
    window.pywebview.api.close_home();
  } catch(e) {
    console.error("Failed to close home screen via JS API:", e);
  }
}

async function refresh(){
  try{
    const d=await window.pywebview.api.get_home_data();
    $('clock').textContent=d.time;
    $('dateStr').textContent=d.date;
    $('greeting').textContent=d.greeting;
    renderAgenda(d.agenda);
    renderWeather(d.weather);
    renderBirthdays(d.birthdays);
    renderOutreach(d.outreach);
    setActiveTopic(d.topic);
    applyMode(d.state.mode, d.state.text);
  }catch(e){}
}
refresh();
setInterval(refresh,600);
</script>
</body>
</html>
